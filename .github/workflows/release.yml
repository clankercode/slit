name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install C toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential musl-tools

      - name: Build C implementation
        run: make build
        working-directory: c

      - name: Build C implementation (static musl)
        run: |
          make clean
          make build CC=musl-gcc CFLAGS="-Wall -Wextra -Werror -std=c11 -pedantic -D_POSIX_C_SOURCE=200809L -O2 -static"
          mv slit slit-static
        working-directory: c

      - name: Build Go implementation
        run: go build -o slit .
        working-directory: go

      - name: Build Rust implementation
        run: cargo build --release
        working-directory: rust

      - name: Prepare release assets
        run: |
          rm -rf dist
          mkdir -p dist/pkg/c/bin dist/pkg/c-static/bin dist/pkg/go/bin dist/pkg/rust/bin dist/docs/man dist/docs/completions
          cp c/slit dist/pkg/c/bin/slit
          cp c/slit-static dist/pkg/c-static/bin/slit
          cp go/slit dist/pkg/go/bin/slit
          cp rust/target/release/slit dist/pkg/rust/bin/slit
          cp LICENSE README.md dist/pkg/c/
          cp LICENSE README.md dist/pkg/c-static/
          cp LICENSE README.md dist/pkg/go/
          cp LICENSE README.md dist/pkg/rust/
          ./go/slit --generate-man > dist/docs/man/slit.1
          ./go/slit completion bash > dist/docs/completions/slit.bash
          ./go/slit completion zsh > dist/docs/completions/_slit
          ./go/slit completion fish > dist/docs/completions/slit.fish
          tar -C dist/pkg/c -czf dist/slit-c-linux-x86_64.tar.gz .
          tar -C dist/pkg/c-static -czf dist/slit-c-linux-x86_64-static.tar.gz .
          tar -C dist/pkg/go -czf dist/slit-go-linux-x86_64.tar.gz .
          tar -C dist/pkg/rust -czf dist/slit-rust-linux-x86_64.tar.gz .
          tar -C dist/docs -czf dist/slit-docs.tar.gz .
          (cd dist && sha256sum slit-*.tar.gz > SHA256SUMS)
        working-directory: .

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/slit-c-linux-x86_64.tar.gz
            dist/slit-c-linux-x86_64-static.tar.gz
            dist/slit-go-linux-x86_64.tar.gz
            dist/slit-rust-linux-x86_64.tar.gz
            dist/slit-docs.tar.gz
            dist/SHA256SUMS

  publish-release:
    runs-on: ubuntu-latest
    needs: build-assets

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=(
            dist/slit-c-linux-x86_64.tar.gz
            dist/slit-c-linux-x86_64-static.tar.gz
            dist/slit-go-linux-x86_64.tar.gz
            dist/slit-rust-linux-x86_64.tar.gz
            dist/slit-docs.tar.gz
            dist/SHA256SUMS
          )
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" "${files[@]}" --generate-notes --verify-tag --repo "$GITHUB_REPOSITORY"
          fi
